<svg viewBox="0 0 500 320" xmlns="http://www.w3.org/2000/svg" width="500" height="320">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#030008"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="320" fill="url(#bg)" rx="6"/>

  <!-- Grid lines -->
  <g stroke="#1a0044" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40" x2="500" y2="40"/>
    <line x1="0" y1="80" x2="500" y2="80"/>
    <line x1="0" y1="120" x2="500" y2="120"/>
    <line x1="0" y1="160" x2="500" y2="160"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="240" x2="500" y2="240"/>
    <line x1="0" y1="280" x2="500" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
  </g>

  <!-- Aura circles behind figure -->
  <ellipse cx="250" cy="175" rx="120" ry="120" fill="#3300aa" opacity="0.07">
    <animate attributeName="rx" values="120;140;120" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="120;140;120" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="250" cy="175" rx="80" ry="80" fill="#5500cc" opacity="0.1">
    <animate attributeName="rx" values="80;95;80" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="80;95;80" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="250" cy="175" rx="50" ry="50" fill="#7700ff" opacity="0.12">
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Shadow soldiers (faded silhouettes in background) -->
  <g opacity="0.35">
    <!-- soldier left -->
    <ellipse cx="110" cy="240" rx="18" ry="45" fill="#2200aa"/>
    <ellipse cx="110" cy="185" rx="14" ry="16" fill="#2200aa"/>
    <circle cx="109" cy="183" r="2" fill="#4499ff" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="114" cy="183" r="2" fill="#4499ff" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <!-- soldier right -->
    <ellipse cx="390" cy="240" rx="18" ry="45" fill="#2200aa"/>
    <ellipse cx="390" cy="185" rx="14" ry="16" fill="#2200aa"/>
    <circle cx="387" cy="183" r="2" fill="#4499ff" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="393" cy="183" r="2" fill="#4499ff" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <!-- soldier far left -->
    <ellipse cx="50" cy="250" rx="12" ry="35" fill="#1a0088"/>
    <ellipse cx="50" cy="208" rx="10" ry="12" fill="#1a0088"/>
    <!-- soldier far right -->
    <ellipse cx="450" cy="250" rx="12" ry="35" fill="#1a0088"/>
    <ellipse cx="450" cy="208" rx="10" ry="12" fill="#1a0088"/>
  </g>

  <!-- JIN-WOO BODY (main figure) -->
  <!-- Cape / coat -->
  <path d="M225,130 Q215,160 200,285 L300,285 Q285,160 275,130 Z" fill="#0a0020"/>
  <!-- Body -->
  <rect x="228" y="130" width="44" height="100" fill="#0d0025" rx="3"/>
  <!-- Armor accents -->
  <rect x="228" y="135" width="44" height="8" fill="#1a0055"/>
  <rect x="232" y="148" width="36" height="4" fill="#220066" rx="2"/>
  <!-- Head -->
  <ellipse cx="250" cy="118" rx="24" ry="26" fill="#100028"/>
  <!-- Hair -->
  <path d="M226,105 Q235,85 250,88 Q265,85 274,105 Q272,95 268,90 Q258,80 250,82 Q242,80 232,90 Z" fill="#050012"/>
  <!-- EYES -->
  <ellipse cx="242" cy="116" rx="8" ry="5" fill="#001133"/>
  <ellipse cx="258" cy="116" rx="8" ry="5" fill="#001133"/>
  <!-- Eye glow blue -->
  <ellipse cx="242" cy="116" rx="6" ry="4" fill="#0077ff">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="258" cy="116" rx="6" ry="4" fill="#0077ff">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
  </ellipse>
  <ellipse cx="242" cy="116" rx="2.5" ry="2" fill="#aaddff"/>
  <ellipse cx="258" cy="116" rx="2.5" ry="2" fill="#aaddff"/>

  <!-- Sword -->
  <rect x="282" y="72" width="5" height="180" fill="#2233aa" rx="2"/>
  <rect x="270" y="105" width="30" height="6" fill="#3344bb" rx="1"/>
  <!-- sword glow -->
  <rect x="283" y="72" width="3" height="180" fill="#6699ff" rx="1" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <!-- sword tip glow -->
  <ellipse cx="284" cy="74" rx="6" ry="10" fill="#4477ff" opacity="0.4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Ground shadow -->
  <ellipse cx="250" cy="285" rx="90" ry="12" fill="#220055" opacity="0.5"/>

  <!-- Floating shadow orbs -->
  <circle cx="155" cy="150" r="6" fill="#3300bb" opacity="0.7">
    <animate attributeName="cy" values="150;138;150" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="345" cy="165" r="5" fill="#3300bb" opacity="0.7">
    <animate attributeName="cy" values="165;153;165" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="185" cy="210" r="4" fill="#4400cc" opacity="0.6">
    <animate attributeName="cy" values="210;198;210" dur="3.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="320" cy="200" r="4" fill="#4400cc" opacity="0.6">
    <animate attributeName="cy" values="200;188;200" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
  </circle>

  <!-- Border frame -->
  <rect x="1" y="1" width="498" height="318" rx="5" fill="none" stroke="#3300aa" stroke-width="1.5">
    <animate attributeName="stroke" values="#3300aa;#6600ff;#3300aa" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Corner decorations -->
  <path d="M1,1 L30,1 L30,4 L4,4 L4,30 L1,30 Z" fill="#6600ff" opacity="0.8"/>
  <path d="M499,1 L470,1 L470,4 L496,4 L496,30 L499,30 Z" fill="#6600ff" opacity="0.8"/>
  <path d="M1,319 L30,319 L30,316 L4,316 L4,290 L1,290 Z" fill="#6600ff" opacity="0.8"/>
  <path d="M499,319 L470,319 L470,316 L496,316 L496,290 L499,290 Z" fill="#6600ff" opacity="0.8"/>

  <!-- UI overlay text -->
  <text x="12" y="18" font-family="'Courier New',monospace" font-size="9" fill="#6633ff" opacity="0.8" letter-spacing="2">SYSTEM — HUNTER PROFILE</text>
  <text x="488" y="18" font-family="'Courier New',monospace" font-size="9" fill="#6633ff" opacity="0.8" text-anchor="end">RANK : S</text>

  <text x="12" y="308" font-family="'Courier New',monospace" font-size="9" fill="#4455ff" opacity="0.7">STATUS: ACTIVE</text>
  <text x="488" y="308" font-family="'Courier New',monospace" font-size="9" fill="#4455ff" opacity="0.7" text-anchor="end">I ALONE LEVEL UP</text>

  <!-- Scanning line effect -->
  <rect x="0" y="0" width="500" height="2" fill="#6633ff" opacity="0.15">
    <animate attributeName="y" values="0;320;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.2;0" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
