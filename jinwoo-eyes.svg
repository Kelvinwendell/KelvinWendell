<svg viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg" width="900" height="180">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#03000f"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a0d4ff"/>
      <stop offset="40%" stop-color="#0088ff"/>
      <stop offset="100%" stop-color="#0022aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a0d4ff"/>
      <stop offset="40%" stop-color="#0088ff"/>
      <stop offset="100%" stop-color="#0022aa" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bgGrad)"/>

  <!-- Scan lines -->
  <rect width="900" height="180" fill="url(#bgGrad)" opacity="0.5"/>
  <line x1="0" y1="60" x2="900" y2="60" stroke="#4b0082" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="90" x2="900" y2="90" stroke="#4b0082" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#4b0082" stroke-width="0.5" opacity="0.4"/>

  <!-- Particles -->
  <g opacity="0.6">
    <circle cx="80" cy="40" r="1.5" fill="#6633ff"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="0s"/></circle>
    <circle cx="200" cy="150" r="1" fill="#0088ff"><animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="400" cy="20" r="2" fill="#a855f7"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="600" cy="160" r="1.5" fill="#0088ff"><animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="750" cy="30" r="1" fill="#6633ff"><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="820" cy="140" r="2" fill="#a855f7"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1.5s"/></circle>
    <circle cx="140" cy="100" r="1" fill="#0088ff"><animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle cx="700" cy="80" r="1.5" fill="#6633ff"><animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite" begin="0.7s"/></circle>
  </g>

  <!-- Energy line -->
  <path d="M0,90 Q150,70 300,90 Q450,110 600,85 Q750,65 900,90" stroke="#0055ff" stroke-width="1.5" fill="none" opacity="0.5">
    <animate attributeName="d" values="M0,90 Q150,70 300,90 Q450,110 600,85 Q750,65 900,90;M0,90 Q150,110 300,85 Q450,65 600,95 Q750,115 900,90;M0,90 Q150,70 300,90 Q450,110 600,85 Q750,65 900,90" dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- LEFT EYE -->
  <!-- outer glow -->
  <ellipse cx="270" cy="90" rx="80" ry="45" fill="#0033cc" opacity="0.15" filter="url(#blur2)">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- iris -->
  <ellipse cx="270" cy="90" rx="52" ry="30" fill="#001155"/>
  <!-- inner glow -->
  <ellipse cx="270" cy="90" rx="44" ry="24" fill="url(#eyeGlow)">
    <animate attributeName="rx" values="44;48;44" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="24;27;24" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- pupil -->
  <ellipse cx="270" cy="90" rx="18" ry="18" fill="#000820"/>
  <!-- bright center -->
  <ellipse cx="270" cy="90" rx="10" ry="10" fill="#88ccff">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- highlight -->
  <ellipse cx="258" cy="80" rx="6" ry="4" fill="white" opacity="0.9"/>
  <!-- eyelid lines -->
  <path d="M218,90 Q270,55 322,90" stroke="#220044" stroke-width="3" fill="none"/>
  <path d="M218,90 Q270,118 322,90" stroke="#110033" stroke-width="2" fill="none"/>

  <!-- RIGHT EYE -->
  <ellipse cx="630" cy="90" rx="80" ry="45" fill="#0033cc" opacity="0.15" filter="url(#blur2)">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </ellipse>
  <ellipse cx="630" cy="90" rx="52" ry="30" fill="#001155"/>
  <ellipse cx="630" cy="90" rx="44" ry="24" fill="url(#eyeGlow2)">
    <animate attributeName="rx" values="44;48;44" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="ry" values="24;27;24" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </ellipse>
  <ellipse cx="630" cy="90" rx="18" ry="18" fill="#000820"/>
  <ellipse cx="630" cy="90" rx="10" ry="10" fill="#88ccff">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
  </ellipse>
  <ellipse cx="618" cy="80" rx="6" ry="4" fill="white" opacity="0.9"/>
  <path d="M578,90 Q630,55 682,90" stroke="#220044" stroke-width="3" fill="none"/>
  <path d="M578,90 Q630,118 682,90" stroke="#110033" stroke-width="2" fill="none"/>

  <!-- Center text -->
  <text x="450" y="28" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#6633ff" opacity="0.7" letter-spacing="4">S Y S T E M</text>
  <text x="450" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#4488ff" opacity="0.8" letter-spacing="6">
    A R I S E
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Corner brackets -->
  <path d="M10,10 L40,10 L40,12 L12,12 L12,40 L10,40 Z" fill="#4b0082" opacity="0.8"/>
  <path d="M890,10 L860,10 L860,12 L888,12 L888,40 L890,40 Z" fill="#4b0082" opacity="0.8"/>
  <path d="M10,170 L40,170 L40,168 L12,168 L12,140 L10,140 Z" fill="#4b0082" opacity="0.8"/>
  <path d="M890,170 L860,170 L860,168 L888,168 L888,140 L890,140 Z" fill="#4b0082" opacity="0.8"/>
</svg>
