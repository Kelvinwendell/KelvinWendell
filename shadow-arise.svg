<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" width="700" height="200">
  <defs>
    <radialGradient id="bgArise" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#0d001f"/>
      <stop offset="100%" stop-color="#020008"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5500cc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5500cc" stop-opacity="0"/>
    </radialGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4400ff" flood-opacity="0.8"/>
    </filter>
  </defs>

  <rect width="700" height="200" fill="url(#bgArise)"/>

  <!-- Ground glow -->
  <ellipse cx="350" cy="185" rx="300" ry="25" fill="url(#centerGlow)">
    <animate attributeName="rx" values="300;340;300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Shadow soldiers rising -->
  <!-- Each has: base shadow, body, head, glowing eyes -->

  <!-- Helper macro-like structure for 7 soldiers -->
  <!-- Soldier 1 -->
  <g>
    <ellipse cx="80" cy="185" rx="20" ry="6" fill="#220055" opacity="0.7"/>
    <rect x="68" y="125" width="24" height="60" fill="#110033" rx="3">
      <animate attributeName="y" values="185;125;125" dur="1.5s" repeatCount="indefinite" begin="0s" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="height" values="0;60;60" dur="1.5s" repeatCount="indefinite" begin="0s" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <ellipse cx="80" cy="115" rx="13" ry="13" fill="#150040">
      <animate attributeName="cy" values="185;115;115" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    </ellipse>
    <circle cx="76" cy="114" r="3" fill="#0066ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="cy" values="185;115;115" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="84" cy="114" r="3" fill="#0066ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="cy" values="185;115;115" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    </circle>
  </g>

  <!-- Soldier 2 -->
  <g>
    <ellipse cx="180" cy="185" rx="20" ry="6" fill="#220055" opacity="0.7"/>
    <rect x="168" y="115" width="24" height="70" fill="#110033" rx="3">
      <animate attributeName="y" values="185;115;115" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
      <animate attributeName="height" values="0;70;70" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
    </rect>
    <ellipse cx="180" cy="105" rx="13" ry="13" fill="#150040">
      <animate attributeName="cy" values="185;105;105" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
    </ellipse>
    <circle cx="176" cy="104" r="3" fill="#0066ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
      <animate attributeName="cy" values="185;105;105" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
    </circle>
    <circle cx="184" cy="104" r="3" fill="#0066ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
      <animate attributeName="cy" values="185;105;105" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
    </circle>
  </g>

  <!-- Soldier 3 -->
  <g>
    <ellipse cx="280" cy="185" rx="22" ry="7" fill="#330077" opacity="0.7"/>
    <rect x="267" y="108" width="26" height="77" fill="#170048" rx="3">
      <animate attributeName="y" values="185;108;108" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="height" values="0;77;77" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <ellipse cx="280" cy="96" rx="15" ry="15" fill="#1a0055">
      <animate attributeName="cy" values="185;96;96" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </ellipse>
    <circle cx="275" cy="95" r="3.5" fill="#0077ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="cy" values="185;96;96" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="285" cy="95" r="3.5" fill="#0077ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="cy" values="185;96;96" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- Soldier 4 - CENTER/IGRIS (biggest) -->
  <g>
    <ellipse cx="350" cy="185" rx="28" ry="9" fill="#440099" opacity="0.8"/>
    <rect x="334" y="85" width="32" height="100" fill="#1f0066" rx="4">
      <animate attributeName="y" values="185;85;85" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
      <animate attributeName="height" values="0;100;100" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
    </rect>
    <ellipse cx="350" cy="72" rx="20" ry="18" fill="#220077">
      <animate attributeName="cy" values="185;72;72" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
    </ellipse>
    <!-- Crown/horns on Igris -->
    <polygon points="340,62 345,45 350,60" fill="#3300aa">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
    </polygon>
    <polygon points="350,60 355,45 360,62" fill="#3300aa">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
    </polygon>
    <circle cx="344" cy="71" r="5" fill="#0088ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
      <animate attributeName="cy" values="185;72;72" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
    </circle>
    <circle cx="356" cy="71" r="5" fill="#0088ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
      <animate attributeName="cy" values="185;72;72" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
    </circle>
  </g>

  <!-- Soldier 5 -->
  <g>
    <ellipse cx="420" cy="185" rx="22" ry="7" fill="#330077" opacity="0.7"/>
    <rect x="407" y="108" width="26" height="77" fill="#170048" rx="3">
      <animate attributeName="y" values="185;108;108" dur="1.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="height" values="0;77;77" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <ellipse cx="420" cy="96" rx="15" ry="15" fill="#1a0055">
      <animate attributeName="cy" values="185;96;96" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </ellipse>
    <circle cx="415" cy="95" r="3.5" fill="#0077ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="cy" values="185;96;96" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="425" cy="95" r="3.5" fill="#0077ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="cy" values="185;96;96" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- Soldier 6 -->
  <g>
    <ellipse cx="520" cy="185" rx="20" ry="6" fill="#220055" opacity="0.7"/>
    <rect x="508" y="115" width="24" height="70" fill="#110033" rx="3">
      <animate attributeName="y" values="185;115;115" dur="1.5s" repeatCount="indefinite" begin="1.25s"/>
      <animate attributeName="height" values="0;70;70" dur="1.5s" repeatCount="indefinite" begin="1.25s"/>
    </rect>
    <ellipse cx="520" cy="105" rx="13" ry="13" fill="#150040">
      <animate attributeName="cy" values="185;105;105" dur="1.5s" repeatCount="indefinite" begin="1.25s"/>
    </ellipse>
    <circle cx="516" cy="104" r="3" fill="#0066ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="1.25s"/>
      <animate attributeName="cy" values="185;105;105" dur="1.5s" repeatCount="indefinite" begin="1.25s"/>
    </circle>
    <circle cx="524" cy="104" r="3" fill="#0066ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="1.25s"/>
      <animate attributeName="cy" values="185;105;105" dur="1.5s" repeatCount="indefinite" begin="1.25s"/>
    </circle>
  </g>

  <!-- Soldier 7 -->
  <g>
    <ellipse cx="620" cy="185" rx="20" ry="6" fill="#220055" opacity="0.7"/>
    <rect x="608" y="125" width="24" height="60" fill="#110033" rx="3">
      <animate attributeName="y" values="185;125;125" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="height" values="0;60;60" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
    </rect>
    <ellipse cx="620" cy="115" rx="13" ry="13" fill="#150040">
      <animate attributeName="cy" values="185;115;115" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
    </ellipse>
    <circle cx="616" cy="114" r="3" fill="#0066ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="cy" values="185;115;115" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="624" cy="114" r="3" fill="#0066ff">
      <animate attributeName="opacity" values="0;0;1" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="cy" values="185;115;115" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>

  <!-- ARISE text -->
  <text x="350" y="35" text-anchor="middle" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#7733ff" letter-spacing="12" filter="url(#dropShadow)">
    A R I S E
    <animate attributeName="opacity" values="0;1;1;0.7;1" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="350" y="55" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#5522aa" letter-spacing="6" opacity="0.7">「 SHADOW EXTRACTION 」</text>

  <!-- Bottom ground line -->
  <line x1="0" y1="190" x2="700" y2="190" stroke="#3300aa" stroke-width="1" opacity="0.5"/>

  <!-- Floating purple particles -->
  <circle cx="30" cy="60" r="2" fill="#6633ff"><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.1s"/><animate attributeName="cy" values="60;40;60" dur="2s" repeatCount="indefinite" begin="0.1s"/></circle>
  <circle cx="670" cy="80" r="2" fill="#6633ff"><animate attributeName="opacity" values="0;1;0" dur="2.3s" repeatCount="indefinite" begin="0.8s"/><animate attributeName="cy" values="80;60;80" dur="2.3s" repeatCount="indefinite" begin="0.8s"/></circle>
  <circle cx="140" cy="70" r="1.5" fill="#4488ff"><animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="560" cy="65" r="1.5" fill="#4488ff"><animate attributeName="opacity" values="0;1;0" dur="2.1s" repeatCount="indefinite" begin="1.1s"/></circle>
</svg>
